name: Build Wii Mobiclip Player

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest

    steps:
    - uses: actions/checkout@v4

    - name: Build Dependencies
      run: ./scripts/build_portlibs.sh

    - name: Build DOL
      run: make

    - name: Package App
      run: |
        mkdir -p artifact_root/apps/wii-mobiclip-player
        cp wii-mobiclip-player.dol artifact_root/apps/wii-mobiclip-player/boot.dol
        if [ -f icon.png ]; then cp icon.png artifact_root/apps/wii-mobiclip-player/; fi
        if [ -f meta.xml ]; then cp meta.xml artifact_root/apps/wii-mobiclip-player/; fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: wii-mobiclip-player
        path: artifact_root/
